<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kers0ne Protection — Monochrome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== CAT'S BLACK & WHITE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --accent2: #aaaaaa;
            --glow: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --muted: #666666;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 32px 20px;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .sidebar .logo span {
            font-weight: 400;
            color: var(--muted);
            font-size: 14px;
        }
        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
        }
        .sidebar nav a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .sidebar nav a.active {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .sidebar nav a .badge-nav {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.06);
            color: var(--muted);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
        }
        .sidebar .bottom {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: auto;
        }
        .sidebar .bottom a {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 12px;
            transition: var(--transition);
            cursor: pointer;
        }
        .sidebar .bottom a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ff4444;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            height: 100vh;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .topbar-left h2 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        .domain-badge {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 12px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px;
        }
        .user {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .user .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            border: 1px solid #333;
        }
        .user .name {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }
        .user .tag {
            color: var(--muted);
            font-size: 12px;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #fff;
            color: #000;
        }
        .btn-primary:hover {
            background: #ddd;
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
        }
        .btn-danger {
            background: rgba(255, 68, 68, 0.08);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.15);
        }
        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.15);
        }
        .btn-success {
            background: rgba(68, 255, 68, 0.08);
            color: #44ff44;
            border: 1px solid rgba(68, 255, 68, 0.15);
        }
        .btn-success:hover {
            background: rgba(68, 255, 68, 0.15);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 11px;
            border-radius: 8px;
        }

        /* CARDS */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }
        .card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card .header h3 {
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .card .header h3 .count {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px;
            border-radius: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .script-card {
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: var(--transition);
        }
        .script-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .script-card .name {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            margin-bottom: 4px;
        }
        .script-card .id {
            color: var(--muted);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 10px;
        }
        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .badge-active {
            background: rgba(68, 255, 68, 0.1);
            color: #44ff44;
        }
        .badge-disabled {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
        }
        .badge-ffa {
            background: rgba(255, 255, 68, 0.1);
            color: #ffff44;
        }
        .badge-compressed {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
        }
        .loadstring-box {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaa;
            word-break: break-all;
            margin: 10px 0;
            cursor: pointer;
            border: 1px dashed var(--border);
            transition: var(--transition);
            position: relative;
        }
        .loadstring-box:hover {
            border-color: #666;
            background: rgba(255, 255, 255, 0.02);
        }
        .loadstring-box .copy-hint {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--muted);
            opacity: 0;
            transition: var(--transition);
        }
        .loadstring-box:hover .copy-hint {
            opacity: 1;
        }
        .script-card .actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .script-card .actions .btn {
            font-size: 11px;
            padding: 6px 14px;
        }

        /* FORMS */
        input,
        textarea,
        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: var(--transition);
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #666;
        }
        textarea {
            resize: vertical;
            min-height: 140px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .form-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            color: var(--muted);
        }
        .form-row input[type="checkbox"] {
            width: auto;
            accent-color: #fff;
            transform: scale(1.1);
        }

        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        .status-message {
            font-size: 13px;
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }
        .status-message.success {
            color: #44ff44;
            border-left: 3px solid #44ff44;
        }
        .status-message.error {
            color: #ff4444;
            border-left: 3px solid #ff4444;
        }
        .status-message.info {
            color: #aaa;
            border-left: 3px solid #555;
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .empty-state h4 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            background: #111;
            border: 1px solid #333;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 999;
            max-width: 400px;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            border-color: #44ff44;
        }
        .toast.error {
            border-color: #ff4444;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 20px;
            }
            .main {
                padding: 20px;
                height: auto;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">Kers0ne <span>Protection</span></div>
        <nav>
            <a class="active" data-panel="panel-scripts">📜 Scripts <span class="badge-nav" id="scriptCount">0</span></a>
            <a data-panel="panel-obfuscator">🔮 Obfuscator</a>
            <a data-panel="panel-keys">🔑 Keys <span class="badge-nav" id="keyCount">0</span></a>
            <a data-panel="panel-hwids">🚫 HWID Bans <span class="badge-nav" id="hwidCount">0</span></a>
        </nav>
        <div class="bottom">
            <a onclick="resetAllData()">🗑️ Reset All Data</a>
        </div>
    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <h2 id="pageTitle">Scripts</h2>
                <span class="domain-badge" id="domainDisplay">🌐 Loading...</span>
            </div>
            <div class="user">
                <div class="avatar">K</div>
                <div>
                    <div class="name">Kers0ne</div>
                    <div class="tag" id="userTag">Active</div>
                </div>
            </div>
        </div>

        <!-- ===== PANEL: SCRIPTS ===== -->
        <div id="panel-scripts" class="panel active">
            <div class="card">
                <div class="header">
                    <h3>Your Scripts <span class="count" id="scriptCountDisplay">0</span></h3>
                    <button class="btn btn-primary" onclick="showPanel('panel-obfuscator')">＋ New Script</button>
                </div>
                <div id="scriptsList" class="grid"></div>
            </div>
        </div>

        <!-- ===== PANEL: OBFUSCATOR ===== -->
        <div id="panel-obfuscator" class="panel">
            <div class="card">
                <div class="header">
                    <h3>🔮 Obfuscate Script</h3>
                    <button class="btn btn-outline" onclick="showPanel('panel-scripts')">← Back</button>
                </div>
                <input type="text" id="scriptName" placeholder="Script Name (e.g. My Hub)" />
                <textarea id="scriptInput" placeholder="-- Paste your Lua script here..."></textarea>
                <div class="form-row">
                    <label><input type="checkbox" id="ffaMode" /> FFA Mode</label>
                    <label><input type="checkbox" id="compressMode" /> Compress</label>
                    <label><input type="checkbox" id="keyProtected" /> Key Protected</label>
                </div>
                <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
                    <button class="btn btn-primary" onclick="obfuscateScript()">🔮 Obfuscate & Save</button>
                    <button class="btn btn-outline" onclick="clearFields()">Clear</button>
                    <button class="btn btn-outline" onclick="copyOutput()">📋 Copy Output</button>
                </div>
                <div id="obfuscateStatus" class="status-message info">Ready to obfuscate.</div>
                <textarea id="scriptOutput" style="margin-top:12px;min-height:140px;font-family:'JetBrains Mono',monospace;font-size:12px" placeholder="Obfuscated output will appear here..." readonly></textarea>
            </div>
        </div>

        <!-- ===== PANEL: KEYS ===== -->
        <div id="panel-keys" class="panel">
            <div class="card">
                <div class="header">
                    <h3>🔑 Your Keys <span class="count" id="keyCountDisplay">0</span></h3>
                    <button class="btn btn-primary" onclick="generateKey()">＋ Generate Key</button>
                </div>
                <div id="keysList" class="grid"></div>
            </div>
        </div>

        <!-- ===== PANEL: HWID BANS ===== -->
        <div id="panel-hwids" class="panel">
            <div class="card">
                <div class="header">
                    <h3>🚫 Banned HWIDs <span class="count" id="hwidCountDisplay">0</span></h3>
                    <button class="btn btn-danger" onclick="addHwid()">＋ Add HWID Ban</button>
                </div>
                <div id="hwidList" class="grid"></div>
            </div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <script>
        // ============================================
        // 🐱 CAT'S PRODUCTION ENGINE - MONOCHROME
        // ============================================

        // --- STORAGE KEYS ---
        const STORAGE_KEYS = {
            scripts: 'kers0ne_scripts',
            keys: 'kers0ne_keys',
            hwids: 'kers0ne_hwids'
        };

        // --- DATA LAYER ---
        function loadData(key) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function getScripts() { return loadData(STORAGE_KEYS.scripts); }

        function setScripts(data) { saveData(STORAGE_KEYS.scripts, data); }

        function getKeys() { return loadData(STORAGE_KEYS.keys); }

        function setKeys(data) { saveData(STORAGE_KEYS.keys, data); }

        function getHwids() { return loadData(STORAGE_KEYS.hwids); }

        function setHwids(data) { saveData(STORAGE_KEYS.hwids, data); }

        // --- ID GENERATION ---
        function generateId() {
            return 'script_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
        }

        function generateKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) key += '-';
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return key;
        }

        // --- DOMAIN DETECTION ---
        function getBaseDomain() {
            return window.location.origin.replace(/\/$/, '');
        }

        function getLoadstringUrl(scriptId) {
            return getBaseDomain() + '/raw/' + scriptId;
        }

        // --- TOAST SYSTEM ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- ESCAPE HTML ---
        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- RESET ALL DATA ---
        window.resetAllData = function() {
            if (!confirm('⚠️ Delete ALL data (scripts, keys, HWIDs)? This cannot be undone!')) return;
            localStorage.removeItem(STORAGE_KEYS.scripts);
            localStorage.removeItem(STORAGE_KEYS.keys);
            localStorage.removeItem(STORAGE_KEYS.hwids);
            renderScripts();
            renderKeys();
            renderHwids();
            showToast('All data wiped', 'error');
        };

        // --- RENDER SCRIPTS ---
        function renderScripts() {
            const scripts = getScripts();
            const container = document.getElementById('scriptsList');
            const countDisplay = document.getElementById('scriptCountDisplay');
            const badge = document.getElementById('scriptCount');

            countDisplay.textContent = scripts.length;
            badge.textContent = scripts.length;

            if (!scripts.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📜</div>
                        <h4>No Scripts Yet</h4>
                        <p style="color:var(--muted);font-size:14px">Create your first script using the Obfuscator.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            for (const s of scripts) {
                const statusClass = s.status === 'active' ? 'badge-active' : 'badge-disabled';
                const loadstring = `loadstring(game:HttpGet("${getLoadstringUrl(s.id)}"))()`;

                html += `
                    <div class="script-card">
                        <div class="name">${escHtml(s.name)}</div>
                        <div class="id">ID: ${s.id}</div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">
                            <span class="badge ${statusClass}">${s.status}</span>
                            ${s.ffa ? '<span class="badge badge-ffa">FFA</span>' : ''}
                            ${s.compressed ? '<span class="badge badge-compressed">Compressed</span>' : ''}
                            ${s.keyProtected ? '<span class="badge" style="background:rgba(255,255,255,0.05);color:#aaa">🔑 Key</span>' : ''}
                        </div>
                        <div class="loadstring-box" onclick="copyLoadstring(this)">
                            ${loadstring}
                            <span class="copy-hint">📋 Click to copy</span>
                        </div>
                        <div class="actions">
                            <button class="btn btn-outline btn-sm" onclick="editScript('${s.id}')">✏️ Edit</button>
                            <button class="btn btn-outline btn-sm" onclick="toggleScript('${s.id}')">${s.status === 'active' ? '⏸️ Disable' : '▶️ Enable'}</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteScript('${s.id}')">🗑️ Delete</button>
                            <button class="btn btn-outline btn-sm" onclick="viewRaw('${s.id}')">📄 Raw</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // --- RENDER KEYS ---
        function renderKeys() {
            const keys = getKeys();
            const container = document.getElementById('keysList');
            const countDisplay = document.getElementById('keyCountDisplay');
            const badge = document.getElementById('keyCount');

            countDisplay.textContent = keys.length;
            badge.textContent = keys.length;

            if (!keys.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔑</div>
                        <h4>No Keys Generated</h4>
                        <p style="color:var(--muted);font-size:14px">Generate keys to protect your scripts.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            for (const k of keys) {
                html += `
                    <div class="script-card">
                        <div style="font-family:'JetBrains Mono',monospace;font-size:15px;color:#fff;font-weight:700">${k.key}</div>
                        <div style="font-size:12px;color:var(--muted)">Expires: ${k.expires || 'Never'}</div>
                        <div style="font-size:12px;margin-top:4px;color:${k.used ? '#ff4444' : '#44ff44'}">${k.used ? '❌ Used' : '✅ Available'}</div>
                        <div style="font-size:11px;color:var(--muted);margin-top:4px">Used by: ${k.usedBy || '—'}</div>
                        <button class="btn btn-danger btn-sm" style="margin-top:10px" onclick="deleteKey('${k.key}')">🗑️ Delete</button>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // --- RENDER HWIDS ---
        function renderHwids() {
            const hwids = getHwids();
            const container = document.getElementById('hwidList');
            const countDisplay = document.getElementById('hwidCountDisplay');
            const badge = document.getElementById('hwidCount');

            countDisplay.textContent = hwids.length;
            badge.textContent = hwids.length;

            if (!hwids.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🚫</div>
                        <h4>No Banned HWIDs</h4>
                        <p style="color:var(--muted);font-size:14px">Add HWIDs to ban specific users.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            for (const h of hwids) {
                html += `
                    <div class="script-card">
                        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#ff4444;font-weight:700">${escHtml(h.hwid)}</div>
                        <div style="font-size:12px;color:var(--muted)">${escHtml(h.reason || 'No reason provided')}</div>
                        <div style="font-size:11px;color:var(--muted);margin-top:4px">Banned: ${h.date || 'Unknown'}</div>
                        <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="unbanHwid('${h.hwid}')">🔓 Unban</button>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // --- SCRIPT OPERATIONS ---
        window.toggleScript = function(id) {
            const scripts = getScripts();
            const script = scripts.find(s => s.id === id);
            if (script) {
                script.status = script.status === 'active' ? 'disabled' : 'active';
                setScripts(scripts);
                renderScripts();
                showToast(`Script ${script.status === 'active' ? 'enabled' : 'disabled'}`, 'success');
            }
        };

        window.deleteScript = function(id) {
            if (!confirm('Delete this script permanently?')) return;
            let scripts = getScripts();
            scripts = scripts.filter(s => s.id !== id);
            setScripts(scripts);
            renderScripts();
            showToast('Script deleted', 'success');
        };

        window.editScript = function(id) {
            const scripts = getScripts();
            const script = scripts.find(s => s.id === id);
            if (!script) return;
            document.getElementById('scriptName').value = script.name;
            document.getElementById('scriptInput').value = script.originalCode || script.obfuscated || '';
            document.getElementById('ffaMode').checked = script.ffa || false;
            document.getElementById('compressMode').checked = script.compressed || false;
            document.getElementById('keyProtected').checked = script.keyProtected || false;
            document.getElementById('scriptOutput').value = '';
            showPanel('panel-obfuscator');
            document.getElementById('obfuscateStatus').className = 'status-message info';
            document.getElementById('obfuscateStatus').textContent = 'Editing: ' + script.name;
            document.getElementById('scriptOutput').dataset.editId = id;
        };

        window.viewRaw = function(id) {
            const scripts = getScripts();
            const script = scripts.find(s => s.id === id);
            if (!script) {
                showToast('Script not found', 'error');
                return;
            }
            const rawContent = script.obfuscated || script.originalCode || '-- No content';
            const win = window.open('', '_blank');
            if (win) {
                win.document.write(`<pre style="background:#000;color:#fff;padding:20px;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;">${escHtml(rawContent)}</pre>`);
                win.document.title = `Raw: ${script.name}`;
            } else {
                navigator.clipboard.writeText(rawContent);
                showToast('Raw content copied to clipboard', 'success');
            }
        };

        window.copyLoadstring = function(el) {
            const text = el.textContent.trim().replace('📋 Click to copy', '').trim();
            navigator.clipboard.writeText(text).then(() => {
                showToast('Loadstring copied!', 'success');
            }).catch(() => {
                const range = document.createRange();
                range.selectNode(el);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                showToast('Loadstring copied!', 'success');
            });
        };

        // --- KEY OPERATIONS ---
        window.generateKey = function() {
            const keys = getKeys();
            const newKey = {
                key: generateKey(),
                expires: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                used: false,
                usedBy: null,
                createdAt: new Date().toISOString()
            };
            keys.push(newKey);
            setKeys(keys);
            renderKeys();
            showToast('Key generated: ' + newKey.key, 'success');
        };

        window.deleteKey = function(key) {
            if (!confirm('Delete this key?')) return;
            let keys = getKeys();
            keys = keys.filter(k => k.key !== key);
            setKeys(keys);
            renderKeys();
            showToast('Key deleted', 'success');
        };

        // --- HWID OPERATIONS ---
        window.addHwid = function() {
            const hwid = prompt('Enter HWID to ban:');
            if (!hwid) return;
            const reason = prompt('Reason for ban (optional):') || 'No reason';
            const hwids = getHwids();
            if (hwids.find(h => h.hwid === hwid)) {
                showToast('HWID already banned', 'error');
                return;
            }
            hwids.push({
                hwid: hwid,
                reason: reason,
                date: new Date().toLocaleDateString()
            });
            setHwids(hwids);
            renderHwids();
            showToast('HWID banned: ' + hwid, 'success');
        };

        window.unbanHwid = function(hwid) {
            if (!confirm('Unban this HWID?')) return;
            let hwids = getHwids();
            hwids = hwids.filter(h => h.hwid !== hwid);
            setHwids(hwids);
            renderHwids();
            showToast('HWID unbanned', 'success');
        };

        // --- OBFUSCATOR ---
        function localObfuscate(code) {
            const key = 0x4B;
            const bytes = new TextEncoder().encode(code);
            const xorred = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) {
                xorred[i] = bytes[i] ^ key;
            }
            let binary = '';
            for (let i = 0; i < xorred.length; i++) {
                binary += String.fromCharCode(xorred[i]);
            }
            const b64 = btoa(binary);
            const reversed = b64.split('').reverse().join('');
            return `-- [[ Kers0ne Protected ]]
local function d(s) local r='' for i=#s,1,-1 do r=r..s:sub(i,i) end return r end
local function x(s) local t={} for i=1,#s do t[i]=string.char(bit32.bxor(s:byte(i),0x4B)) end return table.concat(t) end
local decoded = x(d('${reversed}'))
local fn = loadstring(decoded)
if fn then fn() else print('Decryption failed') end`;
        }

        window.obfuscateScript = async function() {
            const name = document.getElementById('scriptName').value.trim();
            const code = document.getElementById('scriptInput').value;
            const status = document.getElementById('obfuscateStatus');
            const output = document.getElementById('scriptOutput');
            const editId = output.dataset.editId;

            if (!name) {
                status.className = 'status-message error';
                status.textContent = '❌ Please enter a script name.';
                return;
            }
            if (!code.trim()) {
                status.className = 'status-message error';
                status.textContent = '❌ Please paste a Lua script to obfuscate.';
                return;
            }

            status.className = 'status-message info';
            status.textContent = '⏳ Obfuscating...';
            output.value = '';

            try {
                const formData = new FormData();
                const blob = new Blob([code], { type: 'text/plain' });
                formData.append('file', blob, 'script.lua');
                formData.append('anti_env_logger', 'true');

                const response = await fetch('https://kers0ne-0bf.lovable.app/api/public/obfuscate', {
                    method: 'POST',
                    headers: { 'X-API-Key': 'kers0neontop123' },
                    body: formData
                });

                let result;
                let usedRemote = false;
                if (response.ok) {
                    result = await response.text();
                    usedRemote = true;
                } else {
                    result = localObfuscate(code);
                    status.textContent = '⚠️ Using local obfuscation (remote unavailable)';
                }

                output.value = result;

                let scripts = getScripts();
                const ffa = document.getElementById('ffaMode').checked;
                const compressed = document.getElementById('compressMode').checked;
                const keyProtected = document.getElementById('keyProtected').checked;

                if (editId) {
                    const idx = scripts.findIndex(s => s.id === editId);
                    if (idx !== -1) {
                        scripts[idx].name = name;
                        scripts[idx].originalCode = code;
                        scripts[idx].obfuscated = result;
                        scripts[idx].ffa = ffa;
                        scripts[idx].compressed = compressed;
                        scripts[idx].keyProtected = keyProtected;
                        scripts[idx].updatedAt = new Date().toISOString();
                        delete output.dataset.editId;
                        showToast('Script updated!', 'success');
                    }
                } else {
                    const newScript = {
                        id: generateId(),
                        name: name,
                        status: 'active',
                        ffa: ffa,
                        compressed: compressed,
                        keyProtected: keyProtected,
                        originalCode: code,
                        obfuscated: result,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    scripts.unshift(newScript);
                    showToast('Script saved!', 'success');
                }

                setScripts(scripts);
                renderScripts();

                status.className = 'status-message success';
                status.textContent = usedRemote ? '✅ Obfuscation complete! Script saved.' :
                    '✅ Local obfuscation complete. Script saved.';
            } catch (error) {
                try {
                    const fallback = localObfuscate(code);
                    output.value = fallback;
                    let scripts = getScripts();
                    const newScript = {
                        id: generateId(),
                        name: name,
                        status: 'active',
                        ffa: document.getElementById('ffaMode').checked,
                        compressed: document.getElementById('compressMode').checked,
                        keyProtected: document.getElementById('keyProtected').checked,
                        originalCode: code,
                        obfuscated: fallback,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    scripts.unshift(newScript);
                    setScripts(scripts);
                    renderScripts();
                    status.className = 'status-message success';
                    status.textContent = '✅ Local obfuscation saved.';
                    showToast('Script saved with local obfuscation', 'success');
                } catch (e2) {
                    status.className = 'status-message error';
                    status.textContent = '❌ Error: ' + e2.message;
                    showToast('Obfuscation failed', 'error');
                }
            }
        };

        window.clearFields = function() {
            document.getElementById('scriptName').value = '';
            document.getElementById('scriptInput').value = '';
            document.getElementById('scriptOutput').value = '';
            document.getElementById('scriptOutput').dataset.editId = '';
            document.getElementById('ffaMode').checked = false;
            document.getElementById('compressMode').checked = false;
            document.getElementById('keyProtected').checked = false;
            document.getElementById('obfuscateStatus').className = 'status-message info';
            document.getElementById('obfuscateStatus').textContent = 'Ready to obfuscate.';
        };

        window.copyOutput = function() {
            const output = document.getElementById('scriptOutput');
            if (!output.value) {
                document.getElementById('obfuscateStatus').className = 'status-message error';
                document.getElementById('obfuscateStatus').textContent = '❌ Nothing to copy. Obfuscate a script first.';
                return;
            }
            navigator.clipboard.writeText(output.value).then(() => {
                showToast('Output copied!', 'success');
            }).catch(() => {
                output.select();
                document.execCommand('copy');
                showToast('Output copied!', 'success');
            });
        };

        // --- RAW ENDPOINT HANDLER ---
        function handleRawEndpoint() {
            const hash = window.location.hash;
            if (hash.startsWith('#/raw/')) {
                const id = hash.replace('#/raw/', '');
                const scripts = getScripts();
                const script = scripts.find(s => s.id === id);
                if (script) {
                    const content = script.obfuscated || script.originalCode || '-- Script not found';
                    document.body.innerHTML =
                        `<pre style="background:#000;color:#fff;padding:30px;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;min-height:100vh;margin:0;">${escHtml(content)}</pre>`;
                    document.title = 'Raw: ' + script.name;
                } else {
                    document.body.innerHTML =
                        `<pre style="background:#000;color:#ff4444;padding:30px;font-family:monospace;font-size:16px;">Script not found: ${id}</pre>`;
                }
            }
        }

        // --- NAVIGATION ---
        window.showPanel = function(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.sidebar nav a[data-panel="${panelId}"]`);
            if (link) link.classList.add('active');

            const titles = {
                'panel-scripts': 'Scripts',
                'panel-obfuscator': 'Obfuscator',
                'panel-keys': 'Keys',
                'panel-hwids': 'HWID Bans'
            };
            document.getElementById('pageTitle').textContent = titles[panelId] || 'Dashboard';
        };

        document.querySelectorAll('.sidebar nav a').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                window.showPanel(a.dataset.panel);
            });
        });

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', function() {
            const domain = getBaseDomain();
            document.getElementById('domainDisplay').textContent = '🌐 ' + domain;

            handleRawEndpoint();

            renderScripts();
            renderKeys();
            renderHwids();
        });

        // Handle hash changes for raw endpoints
        window.addEventListener('hashchange', handleRawEndpoint);
    </script>
</body>
</html>
