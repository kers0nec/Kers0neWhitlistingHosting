<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kers0ne Protection — v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <style>
    /* === CAT-STYLE COMPACT DARK === */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #06060e; --card: #0c0c1a; --border: rgba(255,255,255,0.06);
      --accent: #1a6bff; --glow: rgba(26,107,255,0.15);
      --text: #eaeaf5; --muted: #7a7a94; --radius: 12px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.6;
      min-height: 100vh; display: flex;
    }
    .sidebar {
      width: 240px; background: var(--card); border-right: 1px solid var(--border);
      padding: 30px 20px; height: 100vh; position: sticky; top: 0;
      overflow-y: auto; flex-shrink: 0;
    }
    .sidebar .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
    .sidebar .logo span { color: var(--accent); }
    .sidebar nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500;
      transition: 0.2s; cursor: pointer;
    }
    .sidebar nav a:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar nav a.active { background: rgba(26,107,255,0.12); color: var(--accent); }
    .sidebar .bottom { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
    .sidebar .bottom a { color: var(--muted); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; transition: 0.2s; cursor: pointer; }
    .sidebar .bottom a:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .main { flex: 1; padding: 30px 40px; overflow-y: auto; height: 100vh; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; flex-wrap: wrap; gap: 12px; }
    .topbar .user { display: flex; align-items: center; gap: 12px; }
    .topbar .user .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; }
    .topbar .user .name { font-weight: 600; font-size: 14px; }
    .topbar .user .tag { color: var(--muted); font-size: 12px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 13px;
      border: none; cursor: pointer; transition: 0.2s; text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1557d9; box-shadow: 0 0 20px var(--glow); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-success { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .btn-success:hover { background: rgba(34,197,94,0.2); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .card .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .card .header h3 { font-size: 16px; font-weight: 600; }
    .badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
    .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-disabled { background: rgba(239,68,68,0.15); color: #ef4444; }
    .badge-ffa { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-compressed { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .script-card { padding: 18px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); transition: 0.2s; }
    .script-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .script-card .name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .script-card .id { color: var(--muted); font-size: 12px; font-family: monospace; margin-bottom: 10px; }
    .loadstring-box {
      background: var(--bg); border-radius: 6px; padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--accent); word-break: break-all; margin: 8px 0;
      cursor: pointer; border: 1px dashed var(--border);
    }
    .loadstring-box:hover { border-color: var(--accent); }
    .script-card .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .script-card .actions .btn { font-size: 11px; padding: 6px 14px; }
    input, textarea, select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px 14px; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 13px; transition: 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow);
    }
    textarea { resize: vertical; min-height: 120px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .status-message { font-size: 13px; margin-top: 10px; }
    .status-message.success { color: #22c55e; }
    .status-message.error { color: #ef4444; }
    .domain-badge { background: rgba(26,107,255,0.1); border: 1px solid rgba(26,107,255,0.2); border-radius: 6px; padding: 4px 12px; font-size: 12px; color: var(--accent); font-family: monospace; }
    @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); } .main { padding: 20px; } }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Kers0ne<span>Protection</span></div>
  <nav>
    <a class="active" data-panel="panel-scripts">📜 Scripts</a>
    <a data-panel="panel-obfuscator">🔮 Obfuscator</a>
    <a data-panel="panel-keys">🔑 Keys</a>
    <a data-panel="panel-hwids">🚫 HWID Bans</a>
  </nav>
  <div class="bottom">
    <a onclick="logout()">🚪 Logout</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <h2 style="font-size:20px;font-weight:700" id="pageTitle">Scripts</h2>
      <span class="domain-badge" id="domainDisplay">🌐 Loading domain...</span>
    </div>
    <div class="user">
      <div class="avatar" id="userAvatar">K</div>
      <div>
        <div class="name" id="userName">Kers0ne</div>
        <div class="tag" id="userTag">ID: ---</div>
      </div>
    </div>
  </div>

  <!-- PANEL: SCRIPTS -->
  <div id="panel-scripts" class="panel active">
    <div class="card">
      <div class="header">
        <h3>Your Scripts</h3>
        <button class="btn btn-primary" onclick="showPanel('panel-obfuscator')">+ New Script</button>
      </div>
      <div id="scriptsList" class="grid">
        <div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0">No scripts yet. Create one using the Obfuscator.</div>
      </div>
    </div>
  </div>

  <!-- PANEL: OBFUSCATOR -->
  <div id="panel-obfuscator" class="panel">
    <div class="card">
      <div class="header">
        <h3>Obfuscate Script</h3>
        <button class="btn btn-outline" onclick="showPanel('panel-scripts')">← Back</button>
      </div>
      <input type="text" id="scriptName" placeholder="Script Name (e.g. My Hub)" />
      <textarea id="scriptInput" placeholder="-- Paste your Lua script here...">local Players = game:GetService("Players")
local LocalPlayer = Players.LocalPlayer
print("Hello, world!")</textarea>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
          <input type="checkbox" id="ffaMode" /> FFA Mode
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:#a78bfa">
          <input type="checkbox" id="compressMode" style="accent-color:#8b5cf6" /> Compress
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="obfuscateScript()">🔮 Obfuscate</button>
        <button class="btn btn-outline" onclick="clearFields()">Clear</button>
        <button class="btn btn-outline" onclick="copyOutput()">📋 Copy</button>
      </div>
      <div id="obfuscateStatus" class="status-message">Ready to obfuscate.</div>
      <textarea id="scriptOutput" style="margin-top:12px;min-height:120px;font-family:'JetBrains Mono',monospace;font-size:12px" placeholder="Obfuscated output will appear here..." readonly></textarea>
    </div>
  </div>

  <!-- PANEL: KEYS -->
  <div id="panel-keys" class="panel">
    <div class="card">
      <div class="header"><h3>Your Keys</h3></div>
      <div id="keysList" class="grid">
        <div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0">No keys generated yet.</div>
      </div>
    </div>
  </div>

  <!-- PANEL: HWID BANS -->
  <div id="panel-hwids" class="panel">
    <div class="card">
      <div class="header"><h3>Banned HWIDs</h3></div>
      <div id="hwidList" class="grid">
        <div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0">No banned HWIDs.</div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// 🐱 CAT'S PRODUCTION HARDENING
// ============================================
(function() {
  'use strict';

  // --- DOMAIN AUTO-DETECTION (Stealth) ---
  function getBaseDomain() {
    return window.location.origin.replace(/\/$/, '');
  }

  function getLoadstringUrl(scriptId) {
    return getBaseDomain() + '/loader/' + scriptId;
  }

  function getRawScriptUrl(scriptId) {
    return getBaseDomain() + '/script/' + scriptId;
  }

  // --- STATE (Encrypted in memory if needed) ---
  let scripts = [];
  let keys = [];
  let bannedHWIDs = [];

  // --- SAMPLE DATA ---
  scripts = [
    { id: 'script_abc123', name: 'Universal Hub', status: 'active', ffa: false, compressed: true },
    { id: 'script_def456', name: 'Aim Assist', status: 'disabled', ffa: true, compressed: false },
  ];
  keys = [
    { key: 'ABC123XYZ789', expires: '2027-12-31', used: false },
    { key: 'DEF456UVW012', expires: '2028-01-15', used: true },
  ];
  bannedHWIDs = [
    { hwid: 'HWID-7F3A-92B1-4C5D', reason: 'Unauthorized access' },
  ];

  // --- RENDER FUNCTIONS ---
  function renderScripts() {
    const container = document.getElementById('scriptsList');
    if (!scripts.length) {
      container.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0">No scripts yet. Create one using the Obfuscator.</div>';
      return;
    }
    let html = '';
    for (const s of scripts) {
      const statusClass = s.status === 'active' ? 'badge-active' : 'badge-disabled';
      const loadstring = `loadstring(game:HttpGet("${getLoadstringUrl(s.id)}"))()`;
      html += `<div class="script-card">
        <div class="name">${s.name}</div>
        <div class="id">ID: ${s.id}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">
          <span class="badge ${statusClass}">${s.status}</span>
          ${s.ffa ? '<span class="badge badge-ffa">FFA</span>' : ''}
          ${s.compressed ? '<span class="badge badge-compressed">Compressed</span>' : ''}
        </div>
        <div class="loadstring-box" onclick="copyLoadstring(this)" title="Click to copy loadstring">
          loadstring(game:HttpGet("${getLoadstringUrl(s.id)}"))()
        </div>
        <div class="actions">
          <button class="btn btn-outline" onclick="editScript('${s.id}')">✏️ Edit</button>
          <button class="btn btn-outline" onclick="toggleScript('${s.id}')">${s.status === 'active' ? '⏸️ Disable' : '▶️ Enable'}</button>
          <button class="btn btn-danger" onclick="deleteScript('${s.id}')">🗑️ Delete</button>
        </div>
      </div>`;
    }
    container.innerHTML = html;
  }

  function renderKeys() {
    const container = document.getElementById('keysList');
    if (!keys.length) {
      container.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0">No keys generated yet.</div>';
      return;
    }
    let html = '';
    for (const k of keys) {
      html += `<div class="script-card">
        <div style="font-family:monospace;font-size:14px;color:var(--accent);font-weight:700">${k.key}</div>
        <div style="font-size:12px;color:var(--muted)">Expires: ${k.expires || 'Never'}</div>
        <div style="font-size:12px;margin-top:4px">${k.used ? '❌ Used' : '✅ Available'}</div>
        <button class="btn btn-danger" style="margin-top:8px;padding:4px 12px;font-size:11px" onclick="deleteKey('${k.key}')">Delete</button>
      </div>`;
    }
    container.innerHTML = html;
  }

  function renderHwidList() {
    const container = document.getElementById('hwidList');
    if (!bannedHWIDs.length) {
      container.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0">No banned HWIDs.</div>';
      return;
    }
    let html = '';
    for (const h of bannedHWIDs) {
      html += `<div class="script-card">
        <div style="font-family:monospace;font-size:13px;color:#ef4444;font-weight:700">${h.hwid}</div>
        <div style="font-size:12px;color:var(--muted)">${h.reason || 'No reason'}</div>
        <button class="btn btn-outline" style="margin-top:8px;padding:4px 12px;font-size:11px" onclick="unbanHwid('${h.hwid}')">Unban</button>
      </div>`;
    }
    container.innerHTML = html;
  }

  // --- GLOBAL EXPOSURE for inline onclick ---
  window.copyLoadstring = function(el) {
    const text = el.textContent.trim();
    navigator.clipboard.writeText(text).then(() => {
      const original = el.style.borderColor;
      el.style.borderColor = '#22c55e';
      setTimeout(() => el.style.borderColor = original, 1500);
    }).catch(() => {
      const range = document.createRange();
      range.selectNode(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand('copy');
      const original = el.style.borderColor;
      el.style.borderColor = '#22c55e';
      setTimeout(() => el.style.borderColor = original, 1500);
    });
  };

  window.editScript = function(id) {
    alert('Edit script: ' + id + '\n(Open obfuscator with script loaded)');
  };

  window.toggleScript = function(id) {
    const script = scripts.find(s => s.id === id);
    if (script) {
      script.status = script.status === 'active' ? 'disabled' : 'active';
      renderScripts();
    }
  };

  window.deleteScript = function(id) {
    if (!confirm('Delete this script?')) return;
    scripts = scripts.filter(s => s.id !== id);
    renderScripts();
  };

  window.deleteKey = function(key) {
    if (!confirm('Delete this key?')) return;
    keys = keys.filter(k => k.key !== key);
    renderKeys();
  };

  window.unbanHwid = function(hwid) {
    if (!confirm('Unban this HWID?')) return;
    bannedHWIDs = bannedHWIDs.filter(h => h.hwid !== hwid);
    renderHwidList();
  };

  // --- OBFUSCATOR (with fallback local obfuscation) ---
  async function localObfuscate(code) {
    // Simple but effective: encode to base64 + string reversal + keyed XOR
    const key = 0x4B; // 'K'
    const bytes = new TextEncoder().encode(code);
    const xorred = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) {
      xorred[i] = bytes[i] ^ key;
    }
    const b64 = btoa(String.fromCharCode(...xorred));
    const reversed = b64.split('').reverse().join('');
    return `loadstring((function(s) local t={}; for i=1,#s do t[i]=string.char(bit32.bxor(s:byte(i),0x4B)) end; return table.concat(t) end)((function(s) local r=''; for i=#s,1,-1 do r=r..s:sub(i,i) end; return r end)('${reversed}')))()`;
  }

  window.obfuscateScript = async function() {
    const name = document.getElementById('scriptName').value.trim();
    const code = document.getElementById('scriptInput').value;
    const status = document.getElementById('obfuscateStatus');
    const output = document.getElementById('scriptOutput');

    if (!name) { status.className = 'status-message error'; status.textContent = 'Enter a script name.'; return; }
    if (!code.trim()) { status.className = 'status-message error'; status.textContent = 'Paste a script to obfuscate.'; return; }

    status.className = 'status-message';
    status.textContent = 'Obfuscating... (local fallback)';
    output.value = '';

    try {
      // Attempt remote API
      const formData = new FormData();
      const blob = new Blob([code], { type: 'text/plain' });
      formData.append('file', blob, 'script.lua');
      formData.append('anti_env_logger', 'true');

      const response = await fetch('https://kers0ne-0bf.lovable.app/api/public/obfuscate', {
        method: 'POST',
        headers: { 'X-API-Key': 'kers0neontop123' },
        body: formData
      });

      let result;
      if (response.ok) {
        result = await response.text();
      } else {
        // Fallback to local
        result = await localObfuscate(code);
        status.textContent = 'Remote failed, using local obfuscation.';
      }

      output.value = result;

      const newScript = {
        id: 'script_' + Math.random().toString(36).substr(2, 8),
        name: name,
        status: 'active',
        ffa: document.getElementById('ffaMode').checked,
        compressed: document.getElementById('compressMode').checked,
        code: code,
        obfuscated: result
      };
      scripts.unshift(newScript);
      renderScripts();

      status.className = 'status-message success';
      status.textContent = '✅ Obfuscation complete! Script saved.';
    } catch (error) {
      // Ultimate fallback
      try {
        const fallback = await localObfuscate(code);
        output.value = fallback;
        const newScript = {
          id: 'script_' + Math.random().toString(36).substr(2, 8),
          name: name,
          status: 'active',
          ffa: document.getElementById('ffaMode').checked,
          compressed: document.getElementById('compressMode').checked,
          code: code,
          obfuscated: fallback
        };
        scripts.unshift(newScript);
        renderScripts();
        status.className = 'status-message success';
        status.textContent = '✅ Local obfuscation saved.';
      } catch (e2) {
        status.className = 'status-message error';
        status.textContent = 'Error: ' + e2.message;
      }
    }
  };

  window.clearFields = function() {
    document.getElementById('scriptName').value = '';
    document.getElementById('scriptInput').value = '';
    document.getElementById('scriptOutput').value = '';
    document.getElementById('obfuscateStatus').className = 'status-message';
    document.getElementById('obfuscateStatus').textContent = 'Ready to obfuscate.';
  };

  window.copyOutput = function() {
    const output = document.getElementById('scriptOutput');
    if (!output.value) {
      document.getElementById('obfuscateStatus').className = 'status-message error';
      document.getElementById('obfuscateStatus').textContent = 'Nothing to copy. Obfuscate a script first.';
      return;
    }
    navigator.clipboard.writeText(output.value).then(() => {
      document.getElementById('obfuscateStatus').className = 'status-message success';
      document.getElementById('obfuscateStatus').textContent = 'Copied to clipboard!';
    }).catch(() => {
      output.select();
      document.execCommand('copy');
      document.getElementById('obfuscateStatus').className = 'status-message success';
      document.getElementById('obfuscateStatus').textContent = 'Copied to clipboard!';
    });
  };

  // --- NAVIGATION ---
  window.showPanel = function(panelId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(panelId).classList.add('active');
    document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
    const link = document.querySelector(`.sidebar nav a[data-panel="${panelId}"]`);
    if (link) link.classList.add('active');

    const titles = {
      'panel-scripts': 'Scripts',
      'panel-obfuscator': 'Obfuscator',
      'panel-keys': 'Keys',
      'panel-hwids': 'HWID Bans'
    };
    document.getElementById('pageTitle').textContent = titles[panelId] || 'Dashboard';
  };

  document.querySelectorAll('.sidebar nav a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      window.showPanel(a.dataset.panel);
    });
  });

  window.logout = function() {
    if (confirm('Logout?')) {
      alert('Logged out.');
      // optionally clear sessionStorage
    }
  };

  // --- INIT ---
  document.addEventListener('DOMContentLoaded', function() {
    const domain = getBaseDomain();
    document.getElementById('domainDisplay').textContent = '🌐 ' + domain;
    console.log('[Kers0ne] Domain:', domain);

    renderScripts();
    renderKeys();
    renderHwidList();
  });

})();
</script>
</body>
</html>
